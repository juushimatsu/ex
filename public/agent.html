<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Агент — Техподдержка</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f1f5f9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    #login-screen { flex: 1; display: flex; align-items: center; justify-content: center; }
    .login-card { background: white; padding: 32px; border-radius: 8px; width: 340px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
    .login-card h2 { font-size: 18px; margin-bottom: 20px; color: #1e293b; text-align: center; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px; color: #374151; }
    .field input { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 5px; font-size: 14px; font-family: inherit; }
    .btn { padding: 8px 14px; border-radius: 5px; font-size: 13px; cursor: pointer; border: none; }
    .btn-primary { background: #2563eb; color: white; width: 100%; margin-top: 6px; padding: 9px; }
    .btn-primary:hover { background: #1d4ed8; }
    #login-err { color: #dc2626; font-size: 12px; margin-top: 8px; text-align: center; display: none; }

    #main-screen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
    header { background: #1e3a5f; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    header h1 { font-size: 16px; font-weight: 600; }
    .hdr-right { display: flex; align-items: center; gap: 12px; font-size: 13px; }
    .hdr-right button { padding: 4px 10px; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: white; border-radius: 4px; cursor: pointer; font-size: 12px; }

    .workspace { display: flex; flex: 1; overflow: hidden; }

    .ticket-panel { width: 290px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; flex-shrink: 0; }
    .panel-head { padding: 10px 14px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
    .panel-head h2 { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #1e293b; }
    .filters { display: flex; gap: 4px; }
    .filter-btn { padding: 3px 9px; font-size: 11px; border-radius: 4px; cursor: pointer; background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
    .filter-btn.on { background: #2563eb; color: white; border-color: #2563eb; }

    .ticket-list { flex: 1; overflow-y: auto; }
    .ticket-item { padding: 9px 14px; border-bottom: 1px solid #f1f5f9; cursor: pointer; user-select: none; }
    .ticket-item:hover { background: #f8fafc; }
    .ticket-item.sel { background: #eff6ff; border-left: 3px solid #2563eb; padding-left: 11px; }
    .ticket-item .subj { font-size: 13px; font-weight: 500; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ticket-item .meta { font-size: 11px; color: #94a3b8; margin-top: 3px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

    .badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 500; }
    .badge-open { background: #dbeafe; color: #1d4ed8; }
    .badge-active { background: #dcfce7; color: #15803d; }
    .badge-closed { background: #f1f5f9; color: #64748b; }
    .badge-mine { background: #fef3c7; color: #92400e; }

    .btn-take { padding: 2px 7px; font-size: 10px; background: #2563eb; color: white; border: none; border-radius: 3px; cursor: pointer; }
    .btn-take:hover { background: #1d4ed8; }

    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 14px; }

    .tabs-bar { background: white; border-bottom: 1px solid #e2e8f0; display: flex; overflow-x: auto; flex-shrink: 0; min-height: 38px; }
    .tab { padding: 8px 14px; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; color: #64748b; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .tab.on { border-bottom-color: #2563eb; color: #2563eb; font-weight: 500; }
    .tab-x { opacity: .5; font-size: 15px; line-height: 1; padding: 0 2px; }
    .tab-x:hover { opacity: 1; }

    .chat-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-head { padding: 9px 16px; border-bottom: 1px solid #e2e8f0; background: white; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .chat-head h3 { font-size: 14px; font-weight: 600; }
    .chat-head .sub { font-size: 12px; color: #64748b; margin-top: 2px; }
    .head-actions { display: flex; gap: 7px; }
    .btn-assign { padding: 5px 11px; font-size: 12px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .btn-assign:hover { background: #1d4ed8; }
    .btn-close-t { padding: 4px 10px; font-size: 12px; background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; border-radius: 4px; cursor: pointer; }
    .btn-close-t:hover { background: #fecaca; }

    .messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 68%; padding: 8px 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; word-break: break-word; }
    .msg.client { background: #e0f2fe; align-self: flex-start; }
    .msg.agent { background: #2563eb; color: white; align-self: flex-end; }
    .msg .from { font-size: 11px; font-weight: 600; margin-bottom: 2px; opacity: .75; }
    .msg .ts { font-size: 11px; margin-top: 3px; opacity: .6; text-align: right; }

    .chat-image { max-width: 260px; max-height: 200px; border-radius: 6px; cursor: pointer; display: block; margin-top: 4px; }

    .chat-input { padding: 9px 14px; border-top: 1px solid #e2e8f0; background: white; display: flex; gap: 8px; flex-shrink: 0; align-items: center; }
    .chat-input textarea { flex: 1; padding: 7px 10px; border: 1px solid #cbd5e1; border-radius: 6px; resize: none; font-size: 13px; font-family: inherit; height: 38px; line-height: 1.4; }
    .chat-input button { padding: 7px 14px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .chat-input button:hover { background: #1d4ed8; }
    .chat-note { padding: 10px; text-align: center; color: #94a3b8; font-size: 13px; background: white; border-top: 1px solid #e2e8f0; flex-shrink: 0; }

    .btn-attach { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 6px; background: #f1f5f9; border: 1px solid #cbd5e1; cursor: pointer; font-size: 16px; flex-shrink: 0; }
    .btn-attach:hover { background: #e2e8f0; }

    #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
    #overlay.show { display: flex; }
    .modal { background: white; border-radius: 8px; padding: 24px; width: 380px; max-width: 90vw; }
    .modal h2 { font-size: 17px; margin-bottom: 6px; }
    .modal p { font-size: 13px; color: #64748b; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .btn-cancel { padding: 7px 14px; border-radius: 5px; font-size: 13px; cursor: pointer; border: none; background: #f1f5f9; color: #374151; border: 1px solid #d1d5db; }
    .btn-cancel:hover { background: #e2e8f0; }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="login-card">
      <h2>Вход агента</h2>
      <div class="field">
        <label>Логин</label>
        <input id="username" type="text" placeholder="agent1" onkeydown="if(event.key==='Enter')login()">
      </div>
      <div class="field">
        <label>Пароль</label>
        <input id="password" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn btn-primary" onclick="login()">Войти</button>
      <div id="login-err">Неверный логин или пароль</div>
    </div>
  </div>

  <div id="main-screen">
    <header>
      <h1>Панель агента — Техподдержка</h1>
      <div class="hdr-right">
        <span id="agent-label"></span>
        <button onclick="logout()">Выйти</button>
      </div>
    </header>
    <div class="workspace">
      <div class="ticket-panel">
        <div class="panel-head">
          <h2>Обращения</h2>
          <div class="filters">
            <button class="filter-btn on" onclick="setFilter('active',this)">Активные</button>
            <button class="filter-btn" onclick="setFilter('open',this)">Открытые</button>
            <button class="filter-btn" onclick="setFilter('mine',this)">Мои</button>
            <button class="filter-btn" onclick="setFilter('all',this)">Все</button>
          </div>
        </div>
        <div class="ticket-list" id="ticket-list"></div>
      </div>
      <div class="chat-area" id="chat-area">
        <div class="chat-empty">Выберите обращение из списка</div>
      </div>
    </div>
  </div>

  <div id="overlay">
    <div class="modal" id="modal-body"></div>
  </div>

  <script src="agent.js"></script>
</body>
</html>
